name: Update README

on:
  schedule:
    - cron: '0 6,10,14,18,22 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Fetch latest repos and update README
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          python3 << 'EOF'
          import requests
          import re
          import os

          token = os.getenv("GITHUB_TOKEN")
          # Use standard Bearer token header for authorization
          headers = {"Authorization": f"Bearer {token}"} if token else {}
          
          # visibility=all pulls both public and private repos
          url = "https://api.github.com/user/repos?sort=updated&per_page=50&visibility=all"
          resp = requests.get(url, headers=headers)
          
          if resp.status_code != 200:
              print(f"Error fetching repos: {resp.status_code} - {resp.text}")
              exit(1)
          
          repos = resp.json()
          
          # Filter out forks so it only grabs original repositories
          filtered_repos = [r for r in repos if not r['fork']]
          
          projects = ""
          for repo in filtered_repos[:4]:
              desc = repo['description'] or 'No description'
              projects += f"- **[{repo['full_name']}]({repo['html_url']})** - {desc}\n"
          
          with open("README.md", "r") as f:
              content = f.read()
          
          pattern = r'(<!-- AUTO-UPDATE-START -->).*?(<!-- AUTO-UPDATE-END -->)'
          replacement = f'\\1\n{projects}\\2'
          content = re.sub(pattern, replacement, content, flags=re.DOTALL)
          
          with open("README.md", "w") as f:
              f.write(content)
          
          print("✓ README updated with latest projects")
          EOF
      
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'auto: update README with latest projects'
          file_pattern: 'README.md'
