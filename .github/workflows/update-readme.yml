name: Update README

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Fetch latest repos and update README
        run: |
          python3 << 'EOF'
          import requests
          import re
          
          user = "callenflynn"
          resp = requests.get(f"https://api.github.com/users/{user}/repos?sort=updated&per_page=6")
          repos = resp.json()
          
          projects = ""
          for repo in repos[:4]:
              desc = repo['description'] or 'No description'
              projects += f"- **[{repo['name']}]({repo['html_url']})** - {desc}\n"
          
          with open("README.md", "r") as f:
              content = f.read()
          
          # Replace only between markers
          pattern = r'(<!-- AUTO-UPDATE-START -->).*?(<!-- AUTO-UPDATE-END -->)'
          replacement = f'\\1\n{projects}\n\\2'
          content = re.sub(pattern, replacement, content, flags=re.DOTALL)
          
          with open("README.md", "w") as f:
              f.write(content)
          EOF
      
      - uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: 'auto: update README with latest projects'
