name: Update README

on:
  schedule:
    - cron: '0 6,10,14,18,22 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Fetch latest repos and update README
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          python3 << 'EOF'
          import requests
          import os

          token = os.getenv("GITHUB_TOKEN")
          headers = {"Authorization": f"Bearer {token}"} if token else {}
          
          # Hits your recent pushes, includes private repos, ignores forks
          url = "https://api.github.com/user/repos?sort=pushed&per_page=20&visibility=all&affiliation=owner"
          resp = requests.get(url, headers=headers)
          
          if resp.status_code != 200:
              print(f"Error fetching repos: {resp.status_code} - {resp.text}")
              exit(1)
          
          repos = resp.json()
          filtered_repos = [r for r in repos if not r['fork']]
          
          # Match your clean HTML format perfectly
          projects = '<ul dir="auto" style="list-style-type: none; padding: 0;">\n'
          for repo in filtered_repos[:4]:
              desc = repo['description'] or 'No description.'
              projects += f'  <li> <b><a href="{repo["html_url"]}">{repo["name"]}</a></b> — {desc}</li>\n'
          projects += '</ul>\n'
          
          start_tag = ""
          end_tag = ""
          
          with open("README.md", "r") as f:
              content = f.read()
          
          if start_tag in content and end_tag in content:
              before, _, remainder = content.partition(start_tag)
              _, _, after = remainder.partition(end_tag)
              
              # Safely stitch the profile back together without losing anything
              new_content = f"{before}{start_tag}\n{projects}{end_tag}{after}"
              
              with open("README.md", "w") as f:
                  f.write(new_content)
              print("✓ README successfully updated with private & public repos!")
          else:
              print("Error: Could not find the HTML comment tags in your README.md!")
              exit(1)
          EOF
      
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'auto: update README with latest projects'
          file_pattern: 'README.md'
