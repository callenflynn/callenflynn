name: Update README

on:
  schedule:
    - cron: '0 6,10,14,18,22 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Fetch latest repos and update README
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          python3 << 'EOF'
          import requests
          import os

          token = os.getenv("GITHUB_TOKEN")
          headers = {"Authorization": f"Bearer {token}"} if token else {}
          
          url = "https://api.github.com/user/repos?sort=pushed&per_page=20&visibility=all&affiliation=owner"
          resp = requests.get(url, headers=headers)
          
          if resp.status_code != 200:
              print(f"Error fetching repos: {resp.status_code} - {resp.text}")
              exit(1)
          
          repos = resp.json()
          filtered_repos = [r for r in repos if not r['fork']]
          
          # Build your HTML format list block
          new_lines = [
              '\n',
              '<ul dir="auto" style="list-style-type: none; padding: 0;">\n'
          ]
          for repo in filtered_repos[:4]:
              desc = repo['description'] or 'No description.'
              new_lines.append(f'  <li> <b><a href="{repo["html_url"]}">{repo["name"]}</a></b> — {desc}</li>\n')
          new_lines.append('</ul>\n')
          new_lines.append('\n')
          
          # Read the current file line by line
          with open("README.md", "r") as f:
              lines = f.readlines()
          
          output = []
          inside_target_zone = False
          found_start = False
          found_end = False
          
          # Line-by-line replacement engine
          for line in lines:
              if "" in line:
                  inside_target_zone = True
                  found_start = True
                  output.extend(new_lines) # Drop the entire fresh list block here
                  continue
              if "" in line:
                  inside_target_zone = False
                  found_end = True
                  continue
              
              # If we are not inside the old list zone, preserve the line
              if not inside_target_zone:
                  output.append(line)
          
          if not (found_start and found_end):
              print("Error: Could not find the comment tags in your README.md file!")
              exit(1)
              
          with open("README.md", "w") as f:
              f.writelines(output)
              
          print("README successfully updated line by line.")
          EOF
      
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'auto: update README with latest projects'
          file_pattern: 'README.md'
